baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Olivero Hugo Theme by Val Paliy'
theme = 'olivero'

# Performance settings
[performance]
  assetDir = "assets"
  assetRelDir = "assets"
  gzip = true
  betterErrors = true

# Minification settings
[minify]
  minifyOutput = true
  disableXML = false
  ignoreFiles = ["*.min.js", "*.min.css"]

# Caching settings
[caching]
  disableHTMLCaching = false

# Pagination
[pagination]
  pagerSize = 6

# Languages configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    languageDirection = "ltr"
    weight = 1
    title = "Olivero Hugo Theme by Val Paliy"
    
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    languageDirection = "ltr"
    weight = 2
    title = "Tema Olivero Hugo por Val Paliy"
    
  [languages.fr]
    languageName = "Français"
    languageCode = "fr"
    languageDirection = "ltr"
    weight = 3
    title = "Thème Olivero Hugo par Val Paliy"
    
  [languages.de]
    languageName = "Deutsch"
    languageCode = "de"
    languageDirection = "ltr"
    weight = 4
    title = "Olivero Hugo Theme von Val Paliy"
    
  [languages.uk]
    languageName = "Українська"
    languageCode = "uk"
    languageDirection = "ltr"
    weight = 5
    title = "Тема Olivero Hugo від Val Paliy"
    
  [languages.ar]
    languageName = "العربية"
    languageCode = "ar"
    languageDirection = "rtl"
    weight = 6
    title = "سtheme Olivero Hugo بواسطة Val Paliy"

[params]
  description = "A 1:1 Hugo replication of Drupal's Olivero theme"
  author = "Val Paliy"
  author_url = "https://valticus.pro"
  logo = "/images/logo.svg"
  show_share_buttons = true
  default_theme = "light" # Options: "light", "dark", "system"
  
  # Custom assets (optional)
  custom_css = [] # Add custom CSS files, e.g., ["css/custom.css"]
  custom_js = []  # Add custom JS files, e.g., ["js/custom.js"]
  
  # Header customization
  [params.header]
    style = "default" # Options: "default", "centered", "minimal"
    show_social_icons = true
    sticky = true
    
  # Footer customization
  [params.footer]
    style = "default" # Options: "default", "minimal", "compact"
    columns = 3 # Number of footer columns (1-4)
    show_social_icons = true
    show_copyright = true
    show_powered_by = true
    
  # Blog/Posts customization
  [params.blog]
    show_excerpt = true
    excerpt_length = 160
    show_reading_time = true
    show_date = true
    show_author = true
    posts_per_page = 6
    layout = "grid" # Options: "grid", "list", "cards"
    
  # Layout options
  [params.layout]
    sidebar_enabled = false # Enable sidebar on pages
    sidebar_position = "right" # Options: "left", "right"
    sidebar_width = "25%" # Sidebar width
    
  # Additional features
  [params.features]
    newsletter = false # Show newsletter signup
    related_posts = true # Show related posts
    author_box = false # Show author bio box
    table_of_contents = true # Show TOC on long pages
    
  # SEO customization
  [params.seo]
    canonical = true
    open_graph = true
    twitter_cards = true
    schema_type = "BlogPosting" # Options: "Article", "BlogPosting", "TechArticle"
    
  # Social links
  [params.social]
    twitter = "https://twitter.com/yourusername"
    facebook = "https://facebook.com/yourusername"
    linkedin = "https://linkedin.com/in/yourusername"
    github = "https://github.com/yourusername"
  
  # Homepage sections
  [[params.sections]]
    title = "Welcome to Olivero Hugo"
    description = "Experience the beauty and accessibility of Drupal's Olivero theme, now available for Hugo"
    content = """
This theme brings the modern, accessible design of Drupal's Olivero theme to Hugo.

Features include mobile-first responsive design, accessible navigation, beautiful typography, and comprehensive styling for all content types.
"""
    
    [[params.sections.features]]
      title = "Mobile-First Design"
      description = "Responsive layout that works perfectly on all devices"
      icon = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z" fill="currentColor"/></svg>'
    
    [[params.sections.features]]
      title = "Accessible Navigation"
      description = "Keyboard-friendly navigation with ARIA support"
      icon = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/></svg>'
    
    [[params.sections.features]]
      title = "Beautiful Typography"
      description = "Lora and Metropolis fonts for optimal readability"
      icon = '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9.93 13.5h4.14L12 7.98zM20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4.05 16.5l-1.14-3H9.17l-1.12 3H5.96l5.11-13h1.86l5.11 13h-2.09z" fill="currentColor"/></svg>'

